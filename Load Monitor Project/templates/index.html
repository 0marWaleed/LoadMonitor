<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="alert alert-danger" id="cpuAlert" role="alert">
        <strong>Alert!</strong> CPU Usage exceeded 30%
    </div>
    <div class="alert alert-danger" id="ramAlert" role="alert">
        <strong>Alert!</strong> RAM Usage exceeded 75%
    </div>

    <div class="container-fluid">
        <h1 class="text-center my-4">System Monitor Dashboard</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">CPU Usage</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="cpuChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Memory Usage</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="memoryChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Recent Metrics</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>Device</th>
                                        <th>CPU %</th>
                                        <th>Memory %</th>
                                        <th>Timestamp</th>
                                    </tr>
                                </thead>
                                <tbody id="metricsTable">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const cpuChart = new Chart(document.getElementById('cpuChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'CPU Usage %',
                    data: [],
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });

        const memoryChart = new Chart(document.getElementById('memoryChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Memory Usage %',
                    data: [],
                    borderColor: 'rgb(255, 99, 132)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });

        function checkThresholds(data) {
            const cpuAlert = document.getElementById('cpuAlert');
            const ramAlert = document.getElementById('ramAlert');

            if (data.cpu_percent > 30) {
                cpuAlert.style.display = 'block';
                // تشغيل صوت التنبيه
                new Audio('https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3').play();
            } else {
                cpuAlert.style.display = 'none';
            }

            if (data.memory_percent > 75) {
                ramAlert.style.display = 'block';
                // تشغيل صوت التنبيه
                new Audio('https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3').play();
            } else {
                ramAlert.style.display = 'none';
            }
        }

        function updateCharts(data) {
            const timestamp = new Date().toLocaleTimeString();
            
            cpuChart.data.labels.push(timestamp);
            cpuChart.data.datasets[0].data.push(data.cpu_percent);
            if (cpuChart.data.labels.length > 20) {
                cpuChart.data.labels.shift();
                cpuChart.data.datasets[0].data.shift();
            }
            cpuChart.update();

            memoryChart.data.labels.push(timestamp);
            memoryChart.data.datasets[0].data.push(data.memory_percent);
            if (memoryChart.data.labels.length > 20) {
                memoryChart.data.labels.shift();
                memoryChart.data.datasets[0].data.shift();
            }
            memoryChart.update();

            // التحقق من العتبات
            checkThresholds(data);
        }

        function updateTable(data) {
            const table = document.getElementById('metricsTable');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${data.device_name}</td>
                <td>${data.cpu_percent.toFixed(1)}%</td>
                <td>${data.memory_percent.toFixed(1)}%</td>
                <td>${new Date().toLocaleString()}</td>
            `;
            table.insertBefore(row, table.firstChild);
            if (table.children.length > 10) {
                table.removeChild(table.lastChild);
            }
        }

        socket.on('new_metrics', function(data) {
            updateCharts(data);
            updateTable(data);
        });

        // Initial load of metrics
        fetch('/api/metrics')
            .then(response => response.json())
            .then(data => {
                data.forEach(metric => {
                    updateCharts(metric);
                    updateTable(metric);
                });
            });
    </script>
</body>
</html>
